<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | QuizMaster</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/index.css">
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>
  <style>
    body {
      display: flex;
      background-attachment: fixed;
    }

    .sidebar {
      width: 280px;
      height: 100vh;
      background: var(--bg-darker);
      border-right: 1px solid var(--glass-border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
    }

    .main-content {
      flex-grow: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    .nav-item {
      padding: 1rem;
      border-radius: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--glass-bg);
      color: var(--text-primary);
    }

    .nav-item.active {
      border-left: 4px solid var(--primary);
    }

    .quiz-card {
      transition: transform 0.3s;
    }

    .quiz-card:hover {
      transform: translateY(-5px);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .hidden {
      display: none !important;
    }

    /* Mobile Responsiveness for Dashboard */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 1rem;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
      }
      .main-content {
        padding: 1rem;
      }
      /* Adjust title and button layout on mobile */
      #dashboard-view > div:first-child,
      #manage-view > div:first-child > div {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 1rem;
      }
      #manage-view > div:first-child > div > div:last-child {
        text-align: left;
        width: 100%;
      }
      #manage-join-code {
        font-size: 1.5rem;
      }
      .hamburger-btn {
        display: flex !important;
        flex-direction: column;
        justify-content: space-around;
        width: 28px;
        height: 24px;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 0;
        z-index: 1000;
      }
      .hamburger-btn .bar {
        width: 100%;
        height: 3px;
        background-color: var(--text-primary);
        border-radius: 10px;
        transition: all 0.3s linear;
        position: relative;
        transform-origin: 1px;
      }
      .hamburger-btn.open .bar:nth-child(1) {
        transform: rotate(45deg);
      }
      .hamburger-btn.open .bar:nth-child(2) {
        opacity: 0;
      }
      .hamburger-btn.open .bar:nth-child(3) {
        transform: rotate(-45deg);
      }
      .mobile-menu-container {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #020502; /* Explicitly use var(--bg-darker) equivalent */
        padding: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        z-index: 999;
        margin-top: 0;
      }
      .mobile-menu-container.show {
        display: flex !important;
      }
      .nav-item.active {
        background: rgba(30, 215, 96, 0.15) !important;
        color: #1ed760 !important;
        border-left: none !important;
        font-weight: 600;
      }
      .sidebar .logo {
        margin-bottom: 0 !important;
      }
      .desktop-only-flex {
        display: none;
      }
    }
    .hamburger-btn {
      display: none;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <div class="logo" style="margin-bottom: 1.5rem;">
        <img src="./images/logo.png" alt="SCALive Logo" class="logo-icon" />
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="theme-toggle-btn" class="btn btn-outline" style="padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-primary); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">☀️</button>
        <button class="hamburger-btn" id="hamburger-btn">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="mobile-menu-container desktop-only-flex" style="flex-grow: 1; flex-direction: column;">
      <nav style="flex-grow: 1;">
        <a href="#" class="nav-item active" onclick="showView('dashboard')">
          Dashboard
        </a>
      </nav>

      <div style="margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);">
        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;">
          <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem;">
            A
          </div>
          <div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin: 0; margin-bottom: 0.2rem;">Logged in as</p>
            <p id="user-name" style="font-weight: 600; margin: 0; color: var(--text-primary);"></p>
          </div>
        </div>
        <button class="btn" style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,50,50,0.1)'; this.style.color='#ff4d4d'; this.style.borderColor='rgba(255,50,50,0.3)';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)'; this.style.borderColor='rgba(255,255,255,0.1)';" onclick="logout()">Logout</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <!-- Dashboard Overview -->
    <div id="dashboard-view" class="animate-fade-in">
      <div class="section-header" style="margin-bottom: 2rem;">
        <h1 class="text-gradient">Host Dashboard</h1>
        <button class="btn btn-primary" onclick="openModal('create-quiz-modal')">+ Create Quiz</button>
      </div>

      <div class="grid-cols-3" id="quizzes-container">
        <!-- Quizzes will be loaded here -->
      </div>
    </div>

    <!-- Manage Quiz View -->
    <div id="manage-view" class="hidden animate-fade-in">
      <div style="margin-bottom: 2rem;">
        <button class="btn btn-outline" style="margin-bottom: 1.5rem;" onclick="showView('dashboard')">← Back to
          Dashboard</button>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
          <div>
            <h1 id="manage-quiz-title" class="text-gradient" style="font-size: 2.5rem;">Quiz Title</h1>
            <p id="manage-quiz-desc" style="color: var(--text-secondary);">Description goes here...</p>
          </div>
          <div style="text-align: right;">
            <div class="glass-card" style="padding: 1rem; margin-bottom: 1rem;">
              <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">JOIN CODE</p>
              <h2 id="manage-join-code" style="letter-spacing: 0.2em; color: var(--primary);">ABCDEF</h2>
            </div>
            <button id="start-live-btn" class="btn btn-primary">🚀 Start Live Room</button>
          </div>
        </div>
      </div>

      <div class="section-header" style="margin-bottom: 1.5rem;">
        <h3>Questions</h3>
        <button class="btn btn-outline" onclick="openModal('add-question-modal')">+ Add Question</button>
      </div>

      <div class="grid-cols-3" id="questions-container">
        <!-- Questions will be loaded here -->
      </div>
    </div>
  </main>

  <!-- Create Quiz Modal -->
  <div id="create-quiz-modal" class="modal-overlay">
    <div class="modal-content glass-card">
      <h2 style="margin-bottom: 1.5rem;">Create New Quiz</h2>
      <form id="create-quiz-form">
        <div id="create-quiz-error" class="hidden" style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(255, 77, 77, 0.3);"></div>
        <div style="margin-bottom: 1.25rem;">
          <label>Title</label>
          <input type="text" id="quiz-title" class="form-control" placeholder="e.g. DSA Quiz" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label>Description</label>
          <textarea id="quiz-desc" class="form-control" rows="3" placeholder="What is this quiz about?"></textarea>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal('create-quiz-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Quiz</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Question Modal -->
  <div id="add-question-modal" class="modal-overlay">
    <div class="modal-content glass-card" style="max-width: 700px;">
      <h2 style="margin-bottom: 1.5rem;">Add New Question</h2>
      <form id="add-question-form">
        <div style="margin-bottom: 1.25rem;">
          <label>Question Text</label>
          <input type="text" id="q-text" class="form-control" required>
        </div>

        <div class="form-grid-2" style="margin-bottom: 1.25rem;">
          <div>
            <label>Option 1</label>
            <input type="text" id="q-opt0" class="form-control" required>
          </div>
          <div>
            <label>Option 2</label>
            <input type="text" id="q-opt1" class="form-control" required>
          </div>
          <div>
            <label>Option 3</label>
            <input type="text" id="q-opt2" class="form-control" required>
          </div>
          <div>
            <label>Option 4</label>
            <input type="text" id="q-opt3" class="form-control" required>
          </div>
        </div>

        <div class="form-grid-3" style="margin-bottom: 2rem;">
          <div>
            <label>Correct Answer</label>
            <select id="q-correct" class="form-control">
              <option value="0">Option 1</option>
              <option value="1">Option 2</option>
              <option value="2">Option 3</option>
              <option value="3">Option 4</option>
            </select>
          </div>
          <div>
            <label>Time (seconds)</label>
            <input type="number" id="q-time" class="form-control" value="30" required>
          </div>
          <div>
            <label>Marks</label>
            <input type="number" id="q-marks" class="form-control" value="10" required>
          </div>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal('add-question-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Question</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/admin.js"></script>
  <script>
    function openModal(id) {
      document.getElementById(id).style.display = 'flex';
    }
    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    // Toggle mobile menu
    document.getElementById('hamburger-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('mobile-menu').classList.toggle('show');
      this.classList.toggle('open');
    });

    // Close modal and mobile menu on click outside
    window.addEventListener('click', function (event) {
      // Close modal
      if (event.target.classList.contains('modal-overlay')) {
        event.target.style.display = 'none';
      }

      // Close mobile menu
      const mobileMenu = document.getElementById('mobile-menu');
      const hamburgerBtn = document.getElementById('hamburger-btn');
      
      if (mobileMenu && mobileMenu.classList.contains('show')) {
        if (!mobileMenu.contains(event.target) && event.target !== hamburgerBtn && !hamburgerBtn.contains(event.target)) {
          mobileMenu.classList.remove('show');
          hamburgerBtn.classList.remove('open');
        }
      }
    });
  </script>
</body>

</html>
