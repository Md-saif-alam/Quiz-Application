<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizMaster | Immersive Real-Time Quizzes</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/index.css">
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>
  <style>
    .hero-section {
      padding: 10rem 0;
      text-align: center;
      position: relative;
    }

    .hero-title {
      font-size: 6rem;
      margin-bottom: 1.5rem;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 3rem;
    }

    .join-container {
      max-width: 500px;
      margin: 0 auto;
    }

    .join-box {
      display: flex;
      gap: 1rem;
      padding: 0.5rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: var(--glass-blur);
    }

    .join-input {
      background: transparent;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1.25rem;
      color: var(--text-primary);
      flex-grow: 1;
      letter-spacing: 0.5em;
      text-align: center;
      text-transform: uppercase;
    }

    .join-input:focus {
      outline: none;
    }

    .join-input::placeholder {
      letter-spacing: normal;
      color: var(--text-muted);
    }

    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 17, 32, 0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .auth-box {
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .hero-section {
        padding: 4rem 1rem;
      }
      .hero-title {
        font-size: 3.5rem;
      }
      .hero-subtitle {
        font-size: 1rem;
        margin-bottom: 2rem;
      }
      .join-box {
        flex-direction: column;
        border-radius: 12px;
        padding: 1rem;
      }
      .join-input {
        font-size: 1rem;
        padding: 0.8rem;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <div class="logo">
        <img src="./images/logo.png" alt="SCALive Logo" class="logo-icon" />
      </div>
      <div class="nav-links">
        <button id="theme-toggle-btn" class="btn btn-outline" style="padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; border: 1px solid var(--glass-border); background: transparent;">☀️</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero-section animate-fade-in">

      <!-- Floating 3D Icons -->
      <div class="floating-icons">
        <!-- <img src="images/half_circle.png" alt="Target" class="float-icon icon-4"> -->
        <!-- <img src="images/glass.png" alt="Trophy" class="float-icon icon-3"> -->
        <!-- <img src="images/question_mark.png" alt="Question" class="float-icon icon-2"> -->
        <img src="images/game.png" alt="Lightbulb" class="float-icon icon-1">
      </div>

      <h1 class="hero-title">Elevate Your <span class="text-gradient">Quiz</span></h1>
      <p class="hero-subtitle">The ultimate real-time quiz platform for students and educators. Challenge yourself and
        climb the leaderboard.</p>

      <div class="join-container" style="position: relative; z-index: 10;">
        <div class="join-box" style="animation-duration: 6s;">
          <input type="text" id="join-code" class="join-input" placeholder="Enter Code" maxlength="6">
          <button class="btn btn-primary" onclick="handleJoin()">Join Now</button>
          <!-- <a href="admin.html" class="btn btn-outline" style="margin-left: 0.5rem;">Host Quiz</a> -->
        </div>
        <p id="join-error" style="color: #ff4d4d; margin-top: 1rem; display: none;"></p>
      </div>
    </section>
  </main>

  <!-- Student Name Entry Overlay -->
  <div id="name-overlay" class="auth-overlay">
    <div class="auth-box glass-card">
      <h2 style="margin-bottom: 1rem;">Almost There!</h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem;">Enter your name to join the quiz room.</p>
      <div style="margin-bottom: 1.5rem;">
        <input type="text" id="student-name" class="form-control" placeholder="Your Display Name" required>
      </div>
      <button onclick="confirmJoin()" class="btn btn-primary" style="width: 100%;">Join Quiz Room</button>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
